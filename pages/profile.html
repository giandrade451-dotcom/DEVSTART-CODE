<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil · Devstart UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E🚀%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div data-site-sidebar></div>
  <div data-site-header></div>

  <main class="container">
    <header class="dash-head reveal">
      <div>
        <h1>Perfil</h1>
        <div class="sub">Gerencie sua conta e sua senha.</div>
      </div>
      <a class="btn danger" href="#" data-logout>Sair</a>
    </header>

    <div class="grid cols-2">
      <section class="card reveal">
        <h2>Detalhes da conta</h2>
        <div class="row" style="gap:14px; padding:16px 0;">
          <div class="avatar" id="avatar" style="width:64px;height:64px;border-radius:50%;background:var(--gradient-brand);display:grid;place-items:center;font-weight:800;color:#fff;font-size:22px;">?</div>
          <div>
            <div id="username" style="font-size:1.3rem;font-weight:700;">—</div>
            <div class="small text-muted" id="role">—</div>
            <div class="small text-muted" id="created">—</div>
          </div>
        </div>
        <form class="form" id="pw-form" style="margin-top:16px;">
          <label for="current">Senha atual</label>
          <input class="input" id="current" type="password" autocomplete="current-password" required />
          <label for="next">Nova senha</label>
          <input class="input" id="next" type="password" autocomplete="new-password" required />
          <button class="btn primary" type="submit">Atualizar senha</button>
        </form>
      </section>

      <section class="card reveal delay-1">
        <h2>Plano</h2>
        <p id="plan-desc" class="text-muted"></p>
        <div id="plan-action" class="mt-2"></div>
        <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;" />
        <h3>Zona de perigo</h3>
        <p class="small text-muted">Limpar os dados locais remove seu progresso e histórico de quizzes neste dispositivo. Os usuários do painel admin são preservados.</p>
        <button class="btn danger mt-1" id="wipe-progress">Limpar meu progresso</button>
      </section>
    </div>
  </main>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/courses-data-2.js"></script>
  <script src="../assets/js/courses-data-3.js"></script>
  <script src="../assets/js/courses-data-4.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const { users, toast, escapeHtml } = window.DevstartApp;
      const user = users.currentUser();
      if (!user) { window.location.href = "login.html"; return; }

      document.getElementById("avatar").textContent = user.username.charAt(0).toUpperCase();
      document.getElementById("username").textContent = user.username;
      document.getElementById("role").textContent = user.vip ? "👑 Membro VIP" : "Plano gratuito";
      document.getElementById("created").textContent = "Entrou em " + new Date(user.createdAt).toLocaleDateString("pt-BR");

      document.getElementById("plan-desc").textContent = user.vip
        ? "Você tem acesso total a todos os cursos da Devstart UP. Aproveite 👑."
        : "Você está no plano gratuito — 4 cursos completos incluídos. Faça upgrade para liberar os 4 cursos VIP.";
      document.getElementById("plan-action").innerHTML = user.vip
        ? `<span class="badge vip">VIP ativo</span>`
        : `<a class="btn vip" href="vip.html">Desbloquear VIP →</a>`;

      document.getElementById("pw-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const cur = document.getElementById("current").value;
        const next = document.getElementById("next").value;
        const fresh = users.currentUser();
        if (fresh.password !== cur) {
          toast({ title: "Senha atual incorreta", type: "error" });
          return;
        }
        if (next.length < 4) {
          toast({ title: "Senha muito curta", message: "Use ao menos 4 caracteres.", type: "error" });
          return;
        }
        users.updateUser(fresh.username, { password: next });
        document.getElementById("current").value = "";
        document.getElementById("next").value = "";
        toast({ title: "Senha atualizada", message: "Use sua nova senha na próxima vez que entrar.", type: "success" });
      });

      document.getElementById("wipe-progress").addEventListener("click", () => {
        if (!confirm("Isto vai apagar todo o seu progresso de aulas e resultados de quizzes. Continuar?")) return;
        const fresh = users.currentUser();
        users.updateUser(fresh.username, { progress: {} });
        toast({ title: "Progresso limpo", message: "Novo começo — vai lá concluir um curso!", type: "info" });
        setTimeout(() => window.location.href = "dashboard.html", 600);
      });
    });
  </script>
</body>
</html>
