<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar · Devstart UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E🚀%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div data-site-sidebar></div>
  <div data-site-header></div>

  <main class="auth-wrap">
    <div class="auth-card reveal">
      <h1>Bem-vindo de volta 👋</h1>
      <p class="sub">Entre para continuar sua jornada de aprendizado.</p>
      <form class="form" id="login-form" autocomplete="on">
        <div>
          <label for="u">Usuário</label>
          <input class="input" id="u" name="username" type="text" autocomplete="username" placeholder="seu-usuario" required />
        </div>
        <div>
          <label for="p">Senha</label>
          <input class="input" id="p" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button class="btn primary block lg" type="submit" id="submit-btn">
          <span id="submit-label">Entrar</span>
        </button>
      </form>
      <div class="auth-alt">
        Ainda não tem conta? <a href="register.html">Criar agora</a>
      </div>
      <div class="auth-alt small" style="margin-top:8px;">
        <a href="admin.html">Entrar como admin →</a>
      </div>
    </div>
  </main>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/courses-data-2.js"></script>
  <script src="../assets/js/courses-data-3.js"></script>
  <script src="../assets/js/courses-data-4.js"></script>
  <script src="../assets/js/courses-data-5.js"></script>
  <script src="../assets/js/courses-data-6.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/site-config.js"></script>
  <script src="../assets/js/gamification.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/ai-assistant.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const { users, toast, resolvePath } = window.DevstartApp;

      if (users.currentUser()) {
        window.location.href = "dashboard.html";
        return;
      }

      const form = document.getElementById("login-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const btn = document.getElementById("submit-btn");
        const label = document.getElementById("submit-label");
        const data = new FormData(form);
        btn.disabled = true;
        label.innerHTML = '<span class="spinner"></span>';
        setTimeout(() => {
          try {
            const u = users.login(data.get("username"), data.get("password"));
            toast({ title: "Bem-vindo de volta!", message: `Logado como ${u.username}`, type: "success" });
            setTimeout(() => { window.location.href = "dashboard.html"; }, 500);
          } catch (err) {
            toast({ title: "Falha no login", message: err.message, type: "error" });
            btn.disabled = false;
            label.textContent = "Entrar";
          }
        }, 400);
      });
    });
  </script>
</body>
</html>
