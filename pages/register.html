<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account · Devstart UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E🚀%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div data-site-sidebar></div>
  <div data-site-header></div>

  <main class="auth-wrap">
    <div class="auth-card reveal">
      <h1>Start your journey 🚀</h1>
      <p class="sub">Create a free Devstart UP account to save progress, take quizzes, and get your own dashboard.</p>
      <form class="form" id="register-form" autocomplete="on">
        <div>
          <label for="u">Username</label>
          <input class="input" id="u" name="username" type="text" autocomplete="username" placeholder="Pick a unique username" required />
          <div class="form-hint">At least 3 characters. Letters, numbers, underscores.</div>
        </div>
        <div>
          <label for="p">Password</label>
          <input class="input" id="p" name="password" type="password" autocomplete="new-password" placeholder="••••••••" required />
          <div class="form-hint">At least 4 characters. Stored only in your browser — this is a demo platform.</div>
        </div>
        <button class="btn primary block lg" type="submit" id="submit-btn">
          <span id="submit-label">Create account</span>
        </button>
      </form>
      <div class="auth-alt">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/courses-data-2.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const { users, toast } = window.DevstartApp;

      if (users.currentUser()) {
        window.location.href = "dashboard.html";
        return;
      }

      const form = document.getElementById("register-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const btn = document.getElementById("submit-btn");
        const label = document.getElementById("submit-label");
        const data = new FormData(form);
        btn.disabled = true;
        label.innerHTML = '<span class="spinner"></span>';
        setTimeout(() => {
          try {
            users.createUser({
              username: data.get("username"),
              password: data.get("password"),
            });
            users.login(data.get("username"), data.get("password"));
            toast({ title: "Account created!", message: "Welcome to Devstart UP.", type: "success" });
            setTimeout(() => { window.location.href = "dashboard.html"; }, 500);
          } catch (err) {
            toast({ title: "Couldn't create account", message: err.message, type: "error" });
            btn.disabled = false;
            label.textContent = "Create account";
          }
        }, 400);
      });
    });
  </script>
</body>
</html>
