<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel · Devstart UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E🚀%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div data-site-sidebar></div>
  <div data-site-header></div>

  <main class="container" id="dash-root">
    <header class="dash-head reveal">
      <div>
        <h1 id="greeting">Bem-vindo de volta!</h1>
        <div class="sub" id="sub-line">Continue de onde parou — seu progresso está salvo.</div>
      </div>
      <div class="row">
        <a class="btn" href="courses.html">Ver cursos</a>
        <a class="btn vip" href="vip.html">Obter VIP</a>
      </div>
    </header>

    <section class="dash-stats reveal" id="dash-stats"></section>

    <section class="mb-3">
      <div class="row between mb-2">
        <h2 style="margin:0;">Cursos em andamento</h2>
        <a class="small text-muted" href="progress.html">Ver progresso completo →</a>
      </div>
      <div class="grid cols-3" id="active-grid"></div>
      <div id="empty-active" class="card reveal hidden" style="text-align:center;">
        <h3>Você ainda não iniciou nenhum curso</h3>
        <p>Comece sua primeira aula e ganhe impulso.</p>
        <a class="btn primary" href="courses.html">Escolher um curso</a>
      </div>
    </section>

    <section class="mb-3">
      <h2>Continue — cursos gratuitos</h2>
      <div class="grid cols-4" id="free-grid"></div>
    </section>

    <section class="mb-3">
      <h2>Trilha VIP</h2>
      <div class="grid cols-4" id="vip-grid"></div>
    </section>
  </main>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/courses-data-2.js"></script>
  <script src="../assets/js/courses-data-3.js"></script>
  <script src="../assets/js/courses-data-4.js"></script>
  <script src="../assets/js/courses-data-5.js"></script>
  <script src="../assets/js/courses-data-6.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/dashboard.js"></script>
</body>
</html>
