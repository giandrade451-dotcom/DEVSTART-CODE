<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curso · Devstart UP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E🚀%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div data-site-sidebar></div>
  <div data-site-header></div>

  <main class="container" id="course-root">
    <div class="card center"><p>Carregando curso…</p></div>
  </main>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/courses-data-2.js"></script>
  <script src="../assets/js/courses-data-3.js"></script>
  <script src="../assets/js/courses-data-4.js"></script>
  <script src="../assets/js/courses-data-5.js"></script>
  <script src="../assets/js/courses-data-6.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/site-config.js"></script>
  <script src="../assets/js/gamification.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/ai-assistant.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const { users, progress, escapeHtml, locks, toast } = window.DevstartApp;
      const user = users.currentUser();
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const course = (window.DevstartCourses || []).find(c => c.id === id);
      const root = document.getElementById("course-root");

      if (!course) {
        root.innerHTML = `<div class="card center"><h2>Curso não encontrado</h2><p>O curso que você procura não existe.</p><a class="btn primary" href="courses.html">Ver todos os cursos</a></div>`;
        return;
      }

      const lockedByAdmin = locks.isCourseLockedForAll(course.id);
      const lockedByVIP = course.vip && (!user || !user.vip);

      if (lockedByAdmin) {
        root.innerHTML = `
          <header class="course-hero reveal"><span class="badge">Bloqueado</span><h1>${escapeHtml(course.title)}</h1><p>Este curso está bloqueado pelo administrador da plataforma no momento.</p><a class="btn" href="courses.html">Voltar aos cursos</a></header>`;
        return;
      }
      if (lockedByVIP) {
        root.innerHTML = `
          <header class="course-hero reveal">
            <span class="badge vip">Somente VIP</span>
            <h1>${escapeHtml(course.title)}</h1>
            <p>${escapeHtml(course.description)}</p>
            <div class="row mt-2">
              <a class="btn vip" href="vip.html">Desbloquear acesso VIP →</a>
              <a class="btn" href="courses.html">Voltar aos cursos</a>
            </div>
          </header>`;
        return;
      }

      const p = user ? progress.getCourseProgress(user, course) : { completed: 0, total: course.lessons.length, percent: 0, completedLessons: [], quizzes: {} };

      root.innerHTML = `
        <header class="course-hero reveal">
          <div class="row" style="gap:8px;">
            <span class="badge ${course.vip ? "vip" : "free"}">${course.vip ? "VIP" : "Grátis"}</span>
            <span class="badge">${escapeHtml(course.level)}</span>
            <span class="badge">⏱ ${escapeHtml(course.duration)}</span>
            <span class="badge">${course.lessons.length} aulas</span>
          </div>
          <h1>${escapeHtml(course.title)}</h1>
          <p style="font-size:1.1rem; max-width:720px; color: var(--text);">${escapeHtml(course.description)}</p>
          <div class="row mt-2">
            <a class="btn primary" href="lesson.html?course=${encodeURIComponent(course.id)}&lesson=${encodeURIComponent(course.lessons[0].id)}">${p.completed === 0 ? "Iniciar curso" : "Continuar"} →</a>
            <span class="course-meta">Instrutor · ${escapeHtml(course.instructor)}</span>
          </div>
          ${user ? `
            <div class="mt-2" style="max-width:540px;">
              <div class="progress-label"><span>${p.completed}/${p.total} aulas</span><span>${p.percent}%</span></div>
              <div class="progress"><span style="width:${p.percent}%"></span></div>
            </div>` : `<p class="small text-muted mt-2">Entre para acompanhar seu progresso.</p>`
          }
        </header>

        <section class="mb-3 mt-4">
          <h2>Aulas</h2>
          <div class="card" style="padding:8px;">
            <div class="lesson-list">
              ${course.lessons.map((l, i) => {
                const done = p.completedLessons.includes(l.id);
                const quiz = p.quizzes[l.id];
                return `<a href="lesson.html?course=${encodeURIComponent(course.id)}&lesson=${encodeURIComponent(l.id)}" class="${done ? "done" : ""}">
                  <span class="num">${done ? "✓" : i + 1}</span>
                  <span class="flex1">
                    <div style="font-weight:600;color:var(--text);">${escapeHtml(l.title)}</div>
                    <div class="small text-muted">${escapeHtml(l.summary)}</div>
                  </span>
                  ${quiz ? `<span class="badge done">${quiz.percent}%</span>` : ""}
                </a>`;
              }).join("")}
            </div>
          </div>
        </section>
      `;

      window.DevstartApp.initReveal();
    });
  </script>
</body>
</html>
